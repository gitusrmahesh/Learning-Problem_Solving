    <script>
        const roadmapData = {
            "Week 1: Foundations & Complexity": {
                days: {
                    "Day 1": { title: "Introduction to Problem Solving", intro: "Today's focus is on deconstructing problems effectively. We'll learn how to analyze problem statements, identify core requirements, and differentiate between a quick solution and an efficient one.", 
                        concepts: [{ title: "Core Concepts", points: ["**Understanding the Problem:** Break down the prompt into inputs, outputs, constraints, and edge cases.", "**Brute Force vs. Optimized:** A brute force solution solves the problem in the most straightforward way, often inefficiently. An optimized solution aims for better time and space complexity."] }],
                        problems: [{id: "sumOfArray", title: "Practice: Sum of an Array", description: "Given an array of integers, write a function to calculate their sum.", solution: "public int SumArray(int[] arr) \n{\n    int sum = 0;\n    foreach(int num in arr) \n    {\n        sum += num;\n    }\n    return sum;\n}"}]

                    "Day 2": { title: "Time Complexity Basics", intro: "Time complexity measures how the runtime of an algorithm scales with the size of the input. Today, we'll cover the fundamental Big O notations used to classify algorithm performance.", 
                        concepts: [{ title: "Big O Notations", points: ["**O(1) - Constant:** Runtime is independent of input size (e.g., array index access).", "**O(log n) - Logarithmic:** Runtime increases logarithmically (e.g., binary search).", "**O(n) - Linear:** Runtime grows linearly with input size (e.g., iterating an array).", "**O(n²) - Quadratic:** Runtime grows quadratically, often due to nested loops (e.g., simple sorting algorithms)."] }],
                        problems: [{id: "analyzeComplexity", title: "Practice: Analyze Nested Loops", description: "What is the time complexity of a function that has two nested loops, each iterating from 0 to n?", solution: "The time complexity is O(n²). The outer loop runs 'n' times, and for each iteration, the inner loop also runs 'n' times. This results in n * n operations." }]
                    },
                    "Day 3": { title: "Space Complexity Basics", intro: "Space complexity analyzes the total memory an algorithm uses. We'll distinguish between memory for inputs and the extra 'auxiliary' space our algorithm needs to run.",

                        problems: [{id: "fibonacciSpace", title: "Practice: Fibonacci Space Complexity", description: "Compare the space complexity of calculating Fibonacci numbers recursively vs. iteratively.", solution: "Recursive Fibonacci has a space complexity of O(n) due to the call stack depth. The iterative approach uses a fixed number of variables (e.g., `a`, `b`, `c`), giving it a space complexity of O(1), which is much more efficient." }]

            "Week 2: Arrays & Techniques": {
                days: {
                    "Day 8": { title: "Array Basics", intro: "Arrays are fundamental. Today, we'll practice common operations like traversal and in-place modifications, which are building blocks for more complex algorithms.",
                        problems: [{id: "rotateArray", title: "Practice: Left Rotation", description: "Implement a function to rotate an array to the left by `k` steps without using extra space.", solution: "A common O(1) space solution is the 'Three Reversals' method: \n1. Reverse the first `k` elements. \n2. Reverse the remaining `n-k` elements. \n3. Reverse the entire array." }]
                    },
                    "Day 9": { title: "Prefix & Suffix Arrays", intro: "Prefix Sum arrays allow for constant-time range sum queries. This powerful technique pre-computes sums to answer questions about subarrays efficiently.", 
                        concepts: [{ title: "The Technique", points: ["A Prefix Sum array `P` is defined as `P[i] = A[0] + A[1] + ... + A[i]`.", "The sum of a subarray from index `i` to `j` can then be calculated in O(1) time as `P[j] - P[i-1]` (with a base case for i=0)."] }],
                        problems: [{id: "rangeSum", title: "Practice: Range Sum Query", description: "Given an array, how would you use a prefix sum array to find the sum of elements between index 3 and 7?", solution: "First, create the prefix sum array `P`. The sum of the range [3, 7] would be `P[7] - P[2]`." }]
                    },
                    "Day 10": { title: "Sliding Window (Fixed Size)", intro: "The sliding window technique is used to efficiently solve problems on contiguous subarrays. The fixed-size window maintains a constant subarray length as it slides across the data.", 
                        problems: [{id: "maxSumSubarray", title: "Practice: Max Sum Subarray of Size K", description: "Find the maximum sum of any contiguous subarray of size `k`. A naive solution is O(n*k). How can you do it in O(n)?", solution: "Calculate the sum of the first window of size `k`. Then, slide the window one element at a time. In each step, subtract the element that's leaving the window and add the element that's entering. This updates the sum in O(1) time for each step, making the total complexity O(n)." }]

                    },

                        problems: [{id: "kadanePractice", title: "Practice: Kadane's Algorithm", description: "Given the array `[-2, 1, -3, 4, -1, 2, 1, -5, 4]`, what is the maximum subarray sum?", solution: "The maximum subarray is `[4, -1, 2, 1]`, and its sum is 6." }]
                    },
                    "Day 14": { title: "Weekly Contest (Arrays Only)", intro: "This contest focuses exclusively on the array techniques learned this week. It's a great way to see how prefix sums, sliding windows, and two-pointers can be combined.", isContest: true, content: "Set a timer for 2.5 hours. Find a contest or create a problem set of 4 medium-difficulty array problems that require the techniques learned in Week 2. Focus on identifying the correct pattern for each problem." }
                }

                        concepts: [{ title: "Simple Sorts", points: ["**Bubble Sort:** Repeatedly steps through the list, compares adjacent elements and swaps them if they are in the wrong order.", "**Selection Sort:** Repeatedly finds the minimum element from the unsorted part and puts it at the beginning.", "**Insertion Sort:** Builds the final sorted array one item at a time."] }],
                        problems: [{id: "bubbleSort", title: "Practice: Bubble Sort", description: "Implement the Bubble Sort algorithm.", solution: "public void BubbleSort(int[] arr) \n{\n    int n = arr.Length;\n    for (int i = 0; i < n - 1; i++)\n        for (int j = 0; j < n - i - 1; j++)\n            if (arr[j] > arr[j + 1])\n            {\n                int temp = arr[j];\n                arr[j] = arr[j + 1];\n                arr[j + 1] = temp;\n            }\n}" }]

                        concepts: [{ title: "Key Algorithms", points: ["**Brian Kernighan’s Algorithm:** A trick to count set bits. The operation `n & (n - 1)` clears the least significant set bit. The number of times you can do this is the number of set bits.", "**Subset Generation:** You can represent subsets of a set of size `n` with numbers from 0 to 2^n - 1. Each bit position corresponds to an element in the set."] }]
                    },

                        problems: [{id: "singleNumber", title: "Practice: Single Number", description: "In an array where every element appears twice except for one, find that single one.", solution: "The XOR operator has the properties `x ^ x = 0` and `x ^ 0 = x`. If you XOR all numbers in the array, the duplicate numbers will cancel each other out, leaving only the single number." }, {id: "powerOfTwo", title: "Practice: Power of Two Check", description: "How can you check if a number is a power of two using bit manipulation?", solution: "A power of two in binary is a 1 followed by all 0s (e.g., 8 is 1000). The number one less than it is all 1s (e.g., 7 is 0111). Therefore, `n & (n - 1)` will be 0 if and only if `n` is a power of two (and n > 0)." }]

        const contentArea = document.getElementById('content-area');
        const roadmapNav = document.getElementById('roadmap-nav');

        function renderContent(week, day) {
            const dayData = roadmapData[week].days[day];
            let html = `<h2 class="text-3xl font-bold mb-2 text-[#6D5B4F]">${day}: ${dayData.title}</h2>`;
            html += `<p class="text-lg text-gray-600 mb-8">${dayData.intro}</p>`;

            if (dayData.isContest) {
                html += `<div class="content-card contest-card p-6 mb-6"><p class="text-lg">${dayData.content}</p></div>`;
            }

            if (dayData.concepts) {
                dayData.concepts.forEach(concept => {
                    html += `<div class="content-card p-6 mb-6">
                                <h3 class="text-xl font-bold text-[#6D5B4F] mb-4">${concept.title}</h3>
                                <ul class="list-disc list-inside space-y-3">`;
                    concept.points.forEach(point => {
                        html += `<li class="text-gray-700">${point.replace(/\*\*(.*?)\*\*/g, '<strong class="font-semibold text-gray-800">$1</strong>')}</li>`;
                    });
                    html += `</ul></div>`;
                });
            }

            if (dayData.problems) {
                dayData.problems.forEach(problem => {
                    html += `<div class="content-card p-6 mb-6">
                                <h3 class="text-xl font-bold text-[#6D5B4F] mb-2">${problem.title}</h3>
                                <p class="mb-4">${problem.description}</p>
                                <button class="btn btn-primary px-4 py-2 rounded-md toggle-solution" data-target="${problem.id}-solution">View Solution</button>
                                <div id="${problem.id}-solution" class="hidden mt-4">
                                    <pre class="code-block">${problem.solution}</pre>
                                </div>
                            </div>`;
                });
            }

            contentArea.innerHTML = html;
            contentArea.scrollTop = 0;
            attachSolutionToggles();
        }

        function attachSolutionToggles() {
            document.querySelectorAll('.toggle-solution').forEach(button => {
                button.addEventListener('click', () => {
                    const targetId = button.dataset.target;
                    const solutionDiv = document.getElementById(targetId);
                    const isHidden = solutionDiv.classList.contains('hidden');
                    
                    if(isHidden) {
                        solutionDiv.classList.remove('hidden');
                        button.textContent = 'Hide Solution';
                    } else {
                        solutionDiv.classList.add('hidden');
                        button.textContent = 'View Solution';
                    }
                });
            });
        }
        
        function updateActiveLink(week, day) {
            document.querySelectorAll('#roadmap-nav a').forEach(link => {
                link.classList.remove('sidebar-item-active');
            });
            const activeLink = document.querySelector(`a[data-week="${week}"][data-day="${day}"]`);
            if(activeLink) {
                activeLink.classList.add('sidebar-item-active');
                
                const parentDetails = activeLink.closest('details');
                if(parentDetails && !parentDetails.open) {
                    parentDetails.open = true;
                }
            }
        }
        
        function initNav() {
            let navHtml = '';
            for (const week in roadmapData) {
                navHtml += `<details class="group" ${week.startsWith("Week 1") ? 'open' : ''}>
                                <summary class="font-semibold text-lg cursor-pointer p-2 rounded-md hover:bg-[#EBE8E2]">${week}</summary>
                                <div class="pl-4 mt-2 space-y-1">`;
                for (const day in roadmapData[week].days) {
                    navHtml += `<a href="#" class="block p-2 rounded-md hover:bg-[#EBE8E2] transition-colors" data-week="${week}" data-day="${day}">${day}</a>`;
                }
                navHtml += `</div></details>`;
            }
            roadmapNav.innerHTML = navHtml;
            
            roadmapNav.addEventListener('click', (e) => {
                if (e.target.tagName === 'A') {
                    e.preventDefault();
                    const week = e.target.dataset.week;
                    const day = e.target.dataset.day;
                    renderContent(week, day);
                    updateActiveLink(week, day);
                    
                    if (window.innerWidth < 768) {
                       document.getElementById('sidebar').classList.add('-translate-x-full');
                    }
                }
            });
        }

        document.getElementById('menu-toggle').addEventListener('click', () => {
             document.getElementById('sidebar').classList.toggle('-translate-x-full');
        });

        // Initial Load
        initNav();
        const firstWeek = Object.keys(roadmapData)[0];
        const firstDay = Object.keys(roadmapData[firstWeek].days)[0];
        renderContent(firstWeek, firstDay);
        updateActiveLink(firstWeek, firstDay);

    </script>
</body>
</html>
